volumes:
  postgres_data:
  evolution_instances:

services:
  whatsapp-monitor-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: whatsapp-monitor-api:latest
    container_name: whatsapp-monitor-api
    ports:
      - "${APP_HOST_PORT:-3001}:3000"
    environment:
      APP_PORT: 3000
      NODE_ENV: production
      
      PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:-https://wamonitor.autoconsa.com}


      FRONTEND_USER: admin
      FRONTEND_PASS: 123456789

      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: 123456789
      DB_NAME: sg_whatsapp

      API_EVOLUTION_URL: http://evolution-api:8080
      API_EVOLUTION_KEY: ae47be328779c370275bf95e61c4feeB8
      WEBHOOK_NEST_EVOLUTION: http://whatsapp-monitor-api:3000/api/webhook/evolution

      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-storage.autoconsa.com}
      MINIO_PORT: ${MINIO_PORT:-443}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-true}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-MinioSecure123!}
      MINIO_BUCKET: conversaciones

      KEYCLOAK_AUTH_SERVER_URL: https://auth.autoconsa.com/auth
      KEYCLOAK_REALM: AUTOCONSA
      KEYCLOAK_CLIENT_ID: siac-api-client
      KEYCLOAK_CLIENT_SECRET: 6VwfzFCs4TYlbjDSMkZHhEvFJTQh4dP0
      KEYCLOAK_REALM_PUBLIC_KEY: MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQE...

    depends_on:
      postgres:
        condition: service_healthy
      evolution-api:
        condition: service_started

    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456789
      POSTGRES_DB: sg_whatsapp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  evolution-api:
    image: evoapicloud/evolution-api:homolog
    container_name: evolution-api
    environment:
      AUTHENTICATION_API_KEY: ae47be328779c370275bf95e61c4feeB8

      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgres://postgres:123456789@postgres:5432/evolution

      CACHE_REDIS_ENABLED: "false"
      CACHE_LOCAL_ENABLED: "true"

      CONFIG_SESSION_PHONE_VERSION: 2.3000.1023204200
      DEFAULT_INTEGRATION: WHATSAPP
      ENABLE_WHATSAPP_BAILEYS: "true"
      ENABLE_WHATSAPP_CLOUD: "false"

      TYPEBOT_ENABLED: "true"
      CHATWOOT_ENABLED: "false"

      TZ: America/Guayaquil
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped